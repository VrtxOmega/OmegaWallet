<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 280px;
            background: #050505;
            color: #e0d6c2;
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .omega {
            font-size: 24px;
            color: #d4a843;
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            color: #d4a843;
        }

        .subtitle {
            font-size: 10px;
            color: #8a8070;
            margin-top: 2px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(212, 168, 67, 0.06);
            border: 1px solid rgba(212, 168, 67, 0.15);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.on {
            background: #00e676;
            box-shadow: 0 0 6px #00e676;
        }

        .dot.off {
            background: #ff1744;
            box-shadow: 0 0 6px #ff1744;
        }

        .status-text {
            font-size: 12px;
        }

        .footer {
            margin-top: 12px;
            font-size: 9px;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header">
        <span class="omega">Ω</span>
        <div>
            <div class="title">OmegaWallet Bridge</div>
            <div class="subtitle">Phantom Relay — Zero Keys</div>
        </div>
    </div>
    <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="status-text" id="status">Checking...</span>
    </div>
    <div class="footer">IPC Cleanroom • AES-256-GCM</div>
    <script src="popup.js"></script>
</body>

</html>
